<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลคะแนนเลือกตั้ง — HR Dashboard</title>
<style>
  :root {
    --accent: #1D9E75; --accent-light: #E1F5EE; --accent-dark: #0F6E56;
    --border: #e5e5e5; --bg: #f7f7f5; --card: #ffffff;
    --text: #1a1a1a; --muted: #888; --gold: #d4a017;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

  .header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header p  { font-size: 12px; color: var(--muted); }
  .refresh-btn {
    margin-left: auto; padding: 7px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .refresh-btn:hover { background: var(--bg); }

  .wrap { max-width: 700px; margin: 0 auto; padding: 20px 16px; }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; text-align: center;
  }
  .stat-num  { font-size: 28px; font-weight: 700; color: var(--accent-dark); }
  .stat-label{ font-size: 12px; color: var(--muted); margin-top: 2px; }

  .section-title {
    font-size: 15px; font-weight: 600; margin: 20px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .badge-elected {
    font-size: 11px; background: var(--accent-light); color: var(--accent-dark);
    border: 1px solid #5DCAA5; border-radius: 20px; padding: 2px 10px; font-weight: 500;
  }

  .result-list { list-style: none; }
  .result-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 8px; transition: border-color 0.15s;
  }
  .result-item.elected { border-color: var(--accent); border-left: 4px solid var(--accent); }

  .rank {
    font-size: 20px; font-weight: 700; min-width: 32px; text-align: center;
    color: var(--muted);
  }
  .rank.top { color: var(--gold); }

  .result-info { flex: 1; }
  .result-name { font-size: 15px; font-weight: 600; }
  .result-dept { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .vote-bar-wrap { flex: 2; }
  .vote-bar-track {
    height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden;
    margin-bottom: 4px;
  }
  .vote-bar-fill {
    height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.6s;
  }
  .result-item.elected .vote-bar-fill { background: var(--accent-dark); }
  .vote-count { font-size: 13px; font-weight: 600; text-align: right; white-space: nowrap; }
  .vote-pct   { font-size: 11px; color: var(--muted); text-align: right; }

  .elected-tag {
    font-size: 11px; background: var(--accent-light); color: var(--accent-dark);
    border-radius: 20px; padding: 3px 10px; font-weight: 500; white-space: nowrap;
  }

  .loading-box {
    text-align: center; padding: 40px;
    font-size: 14px; color: var(--muted);
  }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .vote-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 ผลคะแนนเลือกตั้ง — HR Dashboard</h1>
    <p id="last-update">กำลังโหลด...</p>
  </div>
  <button class="refresh-btn" onclick="loadResults()">🔄 รีเฟรช</button>
</div>

<div class="wrap">
  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-num" id="s-ballots">—</p>
      <p class="stat-label">บัตรที่โหวตแล้ว</p>
    </div>
    <div class="stat-card">
      <p class="stat-num" id="s-total">—</p>
      <p class="stat-label">พนักงานทั้งหมด</p>
    </div>
    <div class="stat-card">
      <p class="stat-num" id="s-pct">—</p>
      <p class="stat-label">ผู้มาใช้สิทธิ์</p>
    </div>
  </div>

  <div id="results-wrap">
    <div class="loading-box">⏳ กำลังโหลดผลคะแนน...</div>
  </div>
</div>

<script>
// ============================================================
// ⚙️ ใส่ URL เดียวกับใน index.html
// ============================================================
const API_URL = "https://script.google.com/macros/s/AKfycbzP4zBkwlFJzrQn-9bJEdXez-FZcMmR3K8uDBLv0x1-08EhbDSGL39-sVAkngBJu_2IjA/exec";

async function loadResults() {
  document.getElementById("last-update").textContent = "กำลังโหลด...";
  try {
    const url = API_URL + "?data=" + encodeURIComponent(JSON.stringify({action:"getResults"}));
    const res  = await fetch(url, {redirect:"follow"});
    const text = await res.text();
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}") + 1;
    const data = JSON.parse(text.substring(start, end));
    if (data.ok) renderResults(data);
    else document.getElementById("results-wrap").innerHTML = "<div class='loading-box'>เกิดข้อผิดพลาด: " + data.message + "</div>";
  } catch(e) {
    // ตัวอย่างข้อมูล demo
    renderResults({
      ok: true,
      totalBallots: 47,
      totalEmployees: 500,
      results: [
        {id:5,name:"ประสิทธิ์ มีชัย",dept:"ฝ่ายคลังสินค้า",votes:38},
        {id:1,name:"สมชาย ใจดี",dept:"ฝ่ายผลิต",votes:35},
        {id:10,name:"พัชรา สว่างใจ",dept:"ฝ่ายบริการลูกค้า",votes:33},
        {id:3,name:"วิชัย สุขสันต์",dept:"ฝ่าย HR",votes:31},
        {id:7,name:"ธีระ อาจหาญ",dept:"ฝ่ายซ่อมบำรุง",votes:30},
        {id:2,name:"สุนีย์ รักงาน",dept:"ฝ่ายบัญชี",votes:29},
        {id:9,name:"อนุชา รุ่งเรือง",dept:"ฝ่ายควบคุมคุณภาพ",votes:28},
        {id:4,name:"นงนุช ขยันดี",dept:"ฝ่ายขาย",votes:22},
        {id:6,name:"กัญญา สดใส",dept:"ฝ่ายไอที",votes:20},
        {id:8,name:"มาลี เปี่ยมสุข",dept:"ฝ่ายจัดซื้อ",votes:18},
        {id:11,name:"ณัฐพล ตั้งใจ",dept:"ฝ่ายโลจิสติกส์",votes:15},
      ]
    });
  }
  document.getElementById("last-update").textContent = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString("th-TH");
}

function renderResults(data) {
  const ballots = data.totalBallots || 0;
  const total   = data.totalEmployees || 500;
  const pct     = total > 0 ? Math.round(ballots / total * 100) : 0;

  document.getElementById("s-ballots").textContent = ballots.toLocaleString();
  document.getElementById("s-total").textContent   = total.toLocaleString();
  document.getElementById("s-pct").textContent     = pct + "%";

  const results = data.results || [];
  const maxVotes = results.length > 0 ? results[0].votes : 1;

  let html = `<p class="section-title">ผลคะแนน <span class="badge-elected">🏆 7 อันดับแรก = ได้รับเลือก</span></p>
  <ul class="result-list">`;

  results.forEach((r, i) => {
    const rank    = i + 1;
    const elected = rank <= 7;
    const pctBar  = maxVotes > 0 ? Math.round(r.votes / maxVotes * 100) : 0;
    const votePct = ballots > 0 ? (r.votes / ballots * 100).toFixed(1) : "0.0";
    const rankCls = rank <= 3 ? "top" : "";
    html += `
    <li class="result-item ${elected ? "elected" : ""}">
      <div class="rank ${rankCls}">${rank}</div>
      <div class="result-info">
        <p class="result-name">${r.name}</p>
        <p class="result-dept">${r.dept}</p>
      </div>
      <div class="vote-bar-wrap">
        <div class="vote-bar-track"><div class="vote-bar-fill" style="width:${pctBar}%"></div></div>
        <p class="vote-pct">${votePct}% ของผู้ใช้สิทธิ์</p>
      </div>
      <div>
        <p class="vote-count">${r.votes} คะแนน</p>
        ${elected ? '<p class="elected-tag">✓ ได้รับเลือก</p>' : ''}
      </div>
    </li>`;
  });

  html += "</ul>";
  document.getElementById("results-wrap").innerHTML = html;
}

loadResults();
setInterval(loadResults, 60000); // auto-refresh ทุก 1 นาที
</script>
</body>
</html>
